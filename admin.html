<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기도제목 관리자</title>
  <style>
    @font-face {
      font-family: 'GmarketSans';
      src: url('./GmarketSansTTFMedium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Jalnan2';
      src: url('./Jalnan2.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #eef6fa;
      --card: rgba(255,255,255,0.95);
      --text: #44515c;
      --muted: #7c8d99;
      --line: rgba(88, 112, 128, 0.14);
      --button: #7aa9c3;
      --button-text: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f2f8fb 0%, #ddedf6 100%);
      font-family: 'GmarketSans', system-ui, sans-serif;
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .title {
      margin: 0 0 8px;
      font-family: 'Jalnan2', system-ui, sans-serif;
      font-size: 32px;
      color: #59788e;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 22px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .login-card, .toolbar, .empty, .item {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 12px 28px rgba(84, 108, 125, 0.08);
    }

    .login-card {
      max-width: 460px;
      margin: 50px auto 0;
      padding: 28px 22px;
      text-align: center;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
    }

    .password-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      font-size: 16px;
      font-family: inherit;
    }

    .button {
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      cursor: pointer;
      background: var(--button);
      color: var(--button-text);
      font-family: 'Jalnan2', system-ui, sans-serif;
      font-size: 17px;
    }

    .toolbar {
      display: none;
      padding: 16px 18px;
      margin-bottom: 18px;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .count { color: var(--muted); }

    .list {
      display: grid;
      gap: 14px;
    }

    .item {
      padding: 18px 18px 16px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .name {
      font-size: 20px;
      color: #4d6474;
    }

    .date {
      color: var(--muted);
      font-size: 14px;
    }

    .prayer {
      white-space: pre-line;
      line-height: 1.8;
      letter-spacing: 0.01em;
      word-break: keep-all;
    }

    .empty {
      display: none;
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      color: #b35c5c;
      margin-top: 10px;
      min-height: 22px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">기도제목 관리자</h1>
    <p class="subtitle">관리자 이메일로 로그인하면 제출된 기도제목을 확인할 수 있습니다.</p>

    <div id="loginCard" class="login-card">
      <label class="label" for="password">관리자 비밀번호</label>
      <input id="password" class="password-input" type="password" placeholder="비밀번호를 입력하세요" />
      <button id="loginBtn" class="button" type="button">확인</button>
      <div id="loginError" class="error"></div>
    </div>

    <div id="toolbar" class="toolbar">
      <div id="count" class="count">불러오는 중...</div>
      <button id="logoutBtn" class="button" type="button">로그아웃</button>
    </div>

    <div id="empty" class="empty">아직 제출된 기도제목이 없습니다.</div>
    <div id="list" class="list"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      setPersistence,
      browserSessionPersistence,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, collection, getDocs, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyB2aPwJkBf7uftGOXBDKddK8wutIfoGfZE',
      authDomain: 'acts5awesome.firebaseapp.com',
      projectId: 'acts5awesome',
      storageBucket: 'acts5awesome.firebasestorage.app',
      messagingSenderId: '845243191457',
      appId: '1:845243191457:web:f3c01044e70a236630a0e0',
      measurementId: 'G-MHNNR994DR'
    };

    const ADMIN_EMAIL = 'acts5.admin@gmail.com';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginCard = document.getElementById('loginCard');
    const toolbar = document.getElementById('toolbar');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    const loginError = document.getElementById('loginError');
    const passwordEl = document.getElementById('password');

    async function renderList() {
      list.innerHTML = '';
      empty.style.display = 'none';
      count.textContent = '불러오는 중...';

      const q = query(collection(db, 'prayers'), orderBy('createdAt', 'desc'));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        empty.style.display = 'block';
        count.textContent = '총 0개';
        return;
      }

      count.textContent = `총 ${snapshot.size}개`;

      snapshot.forEach((doc) => {
        const data = doc.data();
        const item = document.createElement('article');
        item.className = 'item';

        const createdAt = data.createdAt?.toDate ? data.createdAt.toDate() : null;
        const dateText = createdAt
          ? `${createdAt.getFullYear()}.${String(createdAt.getMonth() + 1).padStart(2, '0')}.${String(createdAt.getDate()).padStart(2, '0')} ${String(createdAt.getHours()).padStart(2, '0')}:${String(createdAt.getMinutes()).padStart(2, '0')}`
          : '시간 정보 없음';

        item.innerHTML = `
          <div class="item-head">
            <div class="name"></div>
            <div class="date"></div>
          </div>
          <div class="prayer"></div>
        `;
        item.querySelector('.name').textContent = data.name || '이름 없음';
        item.querySelector('.date').textContent = dateText;
        item.querySelector('.prayer').textContent = data.prayer || '';
        list.appendChild(item);
      });
    }

    async function showAuthedView() {
      loginCard.style.display = 'none';
      toolbar.style.display = 'flex';
      await renderList();
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const password = passwordEl.value.trim();
      loginError.textContent = '';
      if (!password) {
        loginError.textContent = '비밀번호를 입력해주세요.';
        return;
      }
      try {
        await setPersistence(auth, browserSessionPersistence);
        await signInWithEmailAndPassword(auth, ADMIN_EMAIL, password);
      } catch (error) {
        console.error(error);
        loginError.textContent = '비밀번호를 확인해주세요.';
      }
    });

    passwordEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      list.innerHTML = '';
      toolbar.style.display = 'none';
      loginCard.style.display = 'block';
      passwordEl.value = '';
      count.textContent = '';
    });

    onAuthStateChanged(auth, async (user) => {
      if (user && user.email === ADMIN_EMAIL) {
        await showAuthedView();
      } else {
        toolbar.style.display = 'none';
        loginCard.style.display = 'block';
        list.innerHTML = '';
      }
    });
  </script>
</body>
</html>
